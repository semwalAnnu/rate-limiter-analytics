version: "3.9"

networks:
  frontend:   # gateway ↔ clients, gateway ↔ upstream
  backend:    # gateway ↔ Redis/Kafka/TimescaleDB, consumer ↔ Kafka/TimescaleDB

services:
  # ── Infrastructure ────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    networks: [backend]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    networks: [backend]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    networks: [backend]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    networks: [backend]
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: metrics_user
      POSTGRES_PASSWORD: metrics_pass
      POSTGRES_DB: metrics
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrics_user -d metrics"]
      interval: 5s
      retries: 10

  grafana:
    image: grafana/grafana:10.3.3
    networks: [backend]
    ports: ["3000:3000"]
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana

  # ── Application services ───────────────────────────────────────

  upstream:
    build: ./upstream
    networks: [frontend]
    ports: ["8001:8001"]

  gateway:
    build: ./gateway
    networks: [frontend, backend]
    ports: ["8000:8000"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: .env
    environment:
      UPSTREAM_URL: http://upstream:8001

  consumer:
    build: ./consumer
    networks: [backend]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: .env

  test:
    build:
      context: .
      dockerfile: tests/Dockerfile
    env_file: .env
    profiles: ["test"]

  locust:
    build: ./load_tests
    networks: [frontend]
    ports: ["8089:8089"]
    depends_on: [gateway]
    env_file: .env
    profiles: ["loadtest"]

  jupyter:
    image: jupyter/scipy-notebook:latest
    networks: [backend]
    ports: ["8888:8888"]
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      TIMESCALE_URL: ${TIMESCALE_URL:-postgresql://metrics_user:metrics_pass@timescaledb:5432/metrics}
    command: bash -c "pip install -q psycopg2-binary && start-notebook.py"

volumes:
  timescale_data:
  grafana_data:
